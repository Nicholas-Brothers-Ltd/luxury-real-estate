<!DOCTYPE html>
<html>
<head>
  <title>Properties</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
  <div class="logo">Nicholas Experience</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/properties">Properties</a>
    <a href="#">Off-Market</a>
    <a href="#">About</a>
    <a href="/contact">Contact</a>
  </div>
</div>

<section class="properties">

  <div class="filters">
    <select>
      <option>City</option>
      <option>Miami</option>
      <option>Aspen</option>
    </select>

    <select>
      <option>Price</option>
      <option>$1M - $5M</option>
      <option>$5M+</option>
    </select>

    <select>
      <option>Sort By</option>
      <option>Newest</option>
      <option>Price (High to Low)</option>
      <option>Exclusivity</option>
    </select>
  </div>

  <div class="grid">

    <!-- CARD 1 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
      <div class="card-info">
        <h3>Villa Serenita</h3>
        <p>$12.5M · 5 Beds · 7 Baths · 10,000 sqft</p>
        <p class="desc">A modern sanctuary with panoramic ocean views.</p>
        <button class="tour-btn">Virtual Tour</button>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585152915-d208bec867a1">
      <div class="card-info">
        <h3>Aspen Retreat</h3>
        <p>$9.8M · 4 Beds · 6 Baths · 8,500 sqft</p>
        <p class="desc">Luxury mountain escape with ski-in access.</p>
        <button class="tour-btn">Virtual Tour</button>
      </div>
    </div>

  </div>

</section>

</body>
</html>
