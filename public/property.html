<!DOCTYPE html>
<html>
<head>
  <title>Property Detail</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
  <div class="logo">Nicholas Experience</div>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/properties">Properties</a>
    <a href="#">Off-Market</a>
    <a href="#">About</a>
    <a href="/contact">Contact</a>
  </div>
</div>

<!-- HERO VIDEO -->
<section class="property-hero">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
</section>

<!-- CTA BUTTONS -->
<div class="cta-section">
  <button>Request Private Showing</button>
  <button>Inquire Off-Market</button>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="openTab('overview')">Overview</button>
  <button onclick="openTab('features')">Features</button>
  <button onclick="openTab('floor')">Floor Plans</button>
  <button onclick="openTab('location')">Location</button>
</div>

<!-- CONTENT -->
<div class="tab-content" id="overview">
  <h2>Villa Serenita</h2>
  <p>A breathtaking oceanfront estate designed for luxury living.</p>
</div>

<div class="tab-content" id="features">
  <ul>
    <li>Private Pool</li>
    <li>Wine Cellar</li>
    <li>Home Theater</li>
  </ul>
</div>

<div class="tab-content" id="floor">
  <p>Floor plans available upon request.</p>
</div>

<div class="tab-content" id="location">
  <iframe 
    src="https://maps.google.com/maps?q=miami&t=&z=13&ie=UTF8&iwloc=&output=embed">
  </iframe>
</div>

<!-- SOCIAL -->
<div class="social">
  <span>Share:</span>
  <a href="#">X</a>
  <a href="#">Instagram</a>
</div>

<script src="property.js"></script>

</body>
</html>
