<!DOCTYPE html>
<html>
<head>
  <title>Property Detail</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Nicholas Experience</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#buy">Properties</a>
    <a href="#">Off-Market</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO IMAGE (DYNAMIC) -->
<section class="property-hero" id="propertyHero">
  <div class="hero-overlay">
    <h1 id="propertyTitle"></h1>
    <h2 id="propertyPrice"></h2>
    <p id="propertyLocation"></p>
  </div>
</section>

<!-- PROPERTY DETAILS -->
<div class="property-details">
  <h1 id="propertyTitle"></h1>
  <h3 id="propertyPrice"></h3>
  <p id="propertyLocation"></p>
  <p id="propertyDescription"></p>
</div>

<!-- CTA BUTTONS -->
<div class="cta-section">
  <button>Request Private Showing</button>
  <button>Inquire Off-Market</button>
</div>

<!-- TABS -->
<div class="tabs">
  <button onclick="openTab('overview')">Overview</button>
  <button onclick="openTab('features')">Features</button>
  <button onclick="openTab('location')">Location</button>
</div>

<!-- TAB CONTENT -->
<div class="tab-content" id="overview">
  <p id="overviewContent"></p>
</div>

<div class="tab-content" id="features">
  <ul>
    <li>Private Pool</li>
    <li>Wine Cellar</li>
    <li>Smart Home System</li>
  </ul>
</div>

<div class="tab-content" id="location">
  <iframe 
    id="mapFrame"
    width="100%" height="300"
    style="border:0;"
    loading="lazy">
  </iframe>
</div>

<!-- SOCIAL -->
<div class="social">
  <span>Share:</span>
  <a href="#">X</a>
  <a href="#">Instagram</a>
</div>

<!-- SCRIPTS -->
<script src="properties.js"></script>
<script src="property.js"></script>

</body>
</html>
